name: Build Android AAB (Gradle)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 🔥 إعطاء صلاحية تشغيل للـ gradlew (الموجود داخل android/build)
      - name: Make gradlew executable
        run: chmod +x android/build/gradlew

      # 🏗️ بناء AAB عبر Gradle
      - name: Build AAB with Gradle
        run: |
          cd android/build
          ./gradlew bundleRelease

      # 📦 رفع ملف AAB الناتج
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: android/build/app/build/outputs/bundle/release/*.aab
