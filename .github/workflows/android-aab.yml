name: Build Godot AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 تحميل المشروع
      - uses: actions/checkout@v4

      # 🧰 أدوات أساسية
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip findutils

      # 🎮 تحميل Godot 4
      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_linux.x86_64.zip
          unzip Godot_v4.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2-stable_linux.x86_64

      # 🏗️ Export (Godot يقرر مكان الملف)
      - name: Export Android AAB
        run: |
          ./Godot_v4.2-stable_linux.x86_64 --headless \
            --path . \
            --export-release "Android"

      # 🔍 البحث عن ملف AAB الحقيقي
      - name: Find AAB file
        run: |
          echo "Searching for AAB..."
          find . -type f -name "*.aab" || true

      # 📦 رفع أي AAB تم إنشاؤه
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-aab
          path: "**/*.aab"
