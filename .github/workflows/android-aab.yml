name: Build Godot AAB (4.6.3)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 تحميل المشروع
      - uses: actions/checkout@v4

      # ☕ Java (ضروري للأندرويد)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 🧰 أدوات النظام
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip findutils

      # 🎮 تحميل Godot 4.6.3 (نفس نسخة templates عندك)
      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          unzip Godot_v4.6.3-stable_linux.x86_64.zip
          chmod +x Godot_v4.6.3-stable_linux.x86_64

      # 📌 عرض المشروع (debug)
      - name: Show project files
        run: ls -R

      # 🏗️ Build Android AAB
      - name: Export Android AAB
        run: |
          ./Godot_v4.6.3-stable_linux.x86_64 --headless \
            --path . \
            --export-release "Android"

      # 🔍 البحث عن ملف AAB الحقيقي
      - name: Find AAB
        run: find . -type f -name "*.aab" || true

      # 📦 رفع الناتج
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-aab
          path: "**/*.aab"
