name: Build Godot AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 تحميل المشروع
      - uses: actions/checkout@v4

      # 🧰 أدوات مساعدة
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip rsync

      # 🎮 تحميل Godot الرسمي
      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_linux.x86_64.zip
          unzip Godot_v4.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2-stable_linux.x86_64

      # 📌 عرض المشروع للتأكد (debug فقط)
      - name: Show project files
        run: ls -R

      # 🏗️ Build + Export AAB
      - name: Export Android AAB
        run: |
          mkdir -p build

          ./Godot_v4.2-stable_linux.x86_64 --headless \
            --path . \
            --export-release "Android" build/game.aab

      # 🔍 تحقق من الناتج
      - name: Check output
        run: ls -R build || true

      # 📦 رفع الملف الناتج
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-aab
          path: build/game.aab
