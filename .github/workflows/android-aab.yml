name: Build Godot AAB (ULTIMATE FIX)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

      # 🎮 Godot
      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          unzip Godot_v4.6.3-stable_linux.x86_64.zip
          chmod +x Godot_v4.6.3-stable_linux.x86_64

      # 📦 Templates (correct install)
      - name: Install Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.3.stable

          wget https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz

          unzip Godot_v4.6.3-stable_export_templates.tpz -d tmp

          cp -r tmp/templates/* ~/.local/share/godot/export_templates/4.6.3.stable/

      # 🧠 FORCE Godot to register Android export module
      - name: Initialize Godot Project
        run: |
          ./Godot_v4.6.3-stable_linux.x86_64 --headless --editor --quit || true

      # 🏗️ Export (FIXED MODE)
      - name: Export Android AAB
        run: |
          mkdir -p build

          ./Godot_v4.6.3-stable_linux.x86_64 --headless \
            --path . \
            --export-release "Android" \
            "build/FrogTest.aab"

      # 🔍 verify
      - name: Check output
        run: ls -R build || true

      # 📦 upload
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: godot-aab
          path: build/*.aab
