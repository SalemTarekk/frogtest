name: Build Godot Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 1. المشروع
      - uses: actions/checkout@v4

      # ☕ 2. Java (مهم جدًا)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 🧰 3. أدوات النظام
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip rsync

      # 🎮 4. تحميل Godot
      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_linux.x86_64.zip
          unzip Godot_v4.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2-stable_linux.x86_64

      # 📱 5. تحميل Android Command Line Tools (الحل الحقيقي)
      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip -d cmdline-tools
          
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/cmdline-tools/* cmdline-tools/latest/

          yes | cmdline-tools/latest/bin/sdkmanager --licenses || true
          cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      # 📌 6. Debug
      - name: Show project
        run: ls -R

      # 🏗️ 7. Export (الطريقة الصحيحة)
      - name: Build Android AAB
        run: |
          mkdir -p build

          ./Godot_v4.2-stable_linux.x86_64 --headless \
            --path . \
            --export-release "Android"

      # 🔍 8. البحث عن AAB
      - name: Find AAB
        run: find . -name "*.aab" || true

      # 📦 9. رفع الملف
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: godot-aab
          path: "**/*.aab"
